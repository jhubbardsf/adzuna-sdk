name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Mondays at 12:00 UTC. Catches Adzuna API drift even when we're idle.
    - cron: "0 12 * * 1"
  # Manual trigger lets you run integration tests on demand.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel rapid PR pushes; let master + schedule runs always complete.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Typecheck, unit + type tests, build (Bun)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (src)
        run: bunx tsc --noEmit

      - name: Unit + constants tests
        run: bun run test

      - name: Type-level tests
        run: bun run test:types

      - name: Build
        run: bunx tsc

  smoke-node:
    name: Node ${{ matrix.node }} import smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ["24", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun (for build)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bunx tsc

      - name: Pack and install in temp dir
        run: |
          npm pack
          TARBALL=$(ls adzuna-sdk-*.tgz)
          mkdir -p /tmp/smoke
          cp test/smoke/node-import.mjs /tmp/smoke/
          cd /tmp/smoke
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE/$TARBALL" > /dev/null

      - name: Run smoke test on Node ${{ matrix.node }}
        run: |
          cd /tmp/smoke
          node node-import.mjs

  integration:
    name: Integration tests (live Adzuna API)
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: bun run test:integration
