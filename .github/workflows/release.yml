name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch, minor, major) or explicit semver like 1.2.3"
        required: true
        default: "patch"
        type: string
      dry_run:
        description: "Dry run (skip npm publish, git push, and GitHub release creation)"
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing requires 11.5.1+)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

      - name: Build
        run: bunx tsc

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version "${{ inputs.version }}" --no-git-tag-version)
          # npm version prefixes with 'v' — strip for the bare number
          VERSION_NUMBER="${NEW_VERSION#v}"
          echo "version=${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Bumping to ${NEW_VERSION}"

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"

      - name: Push commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin HEAD
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "### Dry run complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Would have published **${{ steps.bump.outputs.tag }}** to npm." >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped: git push, npm publish, gh release create." >> "$GITHUB_STEP_SUMMARY"
